version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: apex
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: apex_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex -d apex"]
      interval: 5s
      timeout: 3s
      retries: 10

  questdb:
    image: questdb/questdb:8.2.1
    ports:
      - "9000:9000"   # REST API + Web Console
      - "9009:9009"   # ILP (InfluxDB Line Protocol)
      - "8812:8812"   # PostgreSQL wire protocol
    volumes:
      - questdb_data:/var/lib/questdb
    environment:
      QDB_HTTP_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/exec?query=SELECT%201 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"   # Client
      - "8222:8222"   # Monitoring
    command: "--jetstream --store_dir /data --http_port 8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Application Services ────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      NATS_URL: nats://nats:4222
      QUESTDB_HOST: questdb
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      questdb:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard/src:/app/src
      - ./dashboard/index.html:/app/index.html
    depends_on:
      - api

volumes:
  pg_data:
  questdb_data:
  redis_data:
  nats_data:
